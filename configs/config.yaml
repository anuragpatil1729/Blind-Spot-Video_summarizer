paths:
  video_path: data/videos/input.mp4
  frames_dir: data/frames/scenes
  chroma_dir: data/index/chroma
  chroma_collection: video_moments
  clips_dir: artifacts/clips
  artifacts_dir: artifacts

scene_detection:
  threshold: 27.0

audio:
  whisper_model: base

ocr:
  languages: ["en"]

embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2

ollama:
  base_url: http://localhost:11434
  vision_model: llava
  query_model: llama3
  agent_model: llama3

performance:
  max_scenes: 300
